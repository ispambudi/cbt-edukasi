<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Ujian</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --border-color: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .login-container { width: 100%; max-width: 400px; padding: 1rem; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        
        h2 { text-align: center; margin-bottom: 1.5rem; color: var(--primary-color); }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.95rem; }
        
        input[type="email"], input[type="password"] {
            width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem;
        }
        input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); }
        
        .btn-primary {
            background-color: var(--primary-color); color: white; border: none; padding: 0.75rem 1.5rem;
            border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 1rem;
        }
        .btn-primary:hover { background-color: var(--primary-hover); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="card">
            <h2>CBT Edukasi</h2>
            <form id="formLogin">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="contoh@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="******" required>
                </div>
                <button type="submit" class="btn-primary">Masuk</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qxeudzvfikxvkrlggaql.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_VRbLLS9RA2TNY2QsGvs7IA_S6mCtlA-'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const btnSubmit = document.querySelector('button[type="submit"]');
            btnSubmit.innerHTML = "Memverifikasi...";
            btnSubmit.disabled = true;

            // Proses login ke Supabase Auth
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Login Gagal: " + error.message);
                btnSubmit.innerHTML = "Masuk";
                btnSubmit.disabled = false;
            } else {
                alert("Login Berhasil! Selamat datang.");
                // Mengalihkan langsung ke Dashboard Guru
                window.location.href = 'dashboard-guru.html';
            }
        });
    </script>
</body>
</html>
